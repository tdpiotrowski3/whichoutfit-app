<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WhichOutfit — Which fit? 👀</title>
<meta name="description" content="Help me pick — vote on my outfit. No app needed."/>

<!-- Link preview (iMessage / social). Generic branded card — served as real text/html
     from whichoutfit.app so it renders as a rich link, not a downloaded document. -->
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="WhichOutfit"/>
<meta property="og:title" content="Which fit? 👀"/>
<meta property="og:description" content="Help me pick — tap to vote. No app needed."/>
<meta property="og:image" content="https://whichoutfit.app/poll-og.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="1200"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Which fit? 👀"/>
<meta name="twitter:description" content="Help me pick — tap to vote. No app needed."/>
<meta name="twitter:image" content="https://whichoutfit.app/poll-og.png"/>

<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<style>
/* WhichOutfit — poll / vote page. Brand tokens mirror the marketing site (style.css)
   and the iOS app: light canvas, blue→teal gradient, ink accents. Green/red on the
   vote controls is semantic (approve / reject), kept distinct from the brand accent. */
:root{
  --blue:#2E6BFF; --teal:#0FA3A3; --green:#16B981; --red:#F04438;
  --grad:linear-gradient(135deg,#2E6BFF 0%,#0FA3A3 100%);
  --ink:#10141B; --muted:#5C6B7A; --bg:#F5F7FB; --card:#FFFFFF; --line:#E2E8F0;
  --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:26px; --pill:999px;
  --ease:cubic-bezier(.2,0,0,1);
  --shadow:0 1px 2px rgba(16,20,27,.04),0 12px 32px rgba(16,20,27,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
img{display:block;max-width:100%}

/* ambient brand glow */
.bg-orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-orbs::before,.bg-orbs::after{content:'';position:absolute;border-radius:50%}
.bg-orbs::before{width:540px;height:540px;top:-260px;left:-160px;background:radial-gradient(circle,rgba(46,107,255,.12),transparent 66%)}
.bg-orbs::after{width:500px;height:500px;bottom:-240px;right:-160px;background:radial-gradient(circle,rgba(15,163,163,.11),transparent 66%)}

header{position:relative;z-index:1;padding:22px 18px 2px;text-align:center}
.brand{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:1.05rem;letter-spacing:-.02em;color:var(--ink)}
.brand .logo{width:26px;height:26px;border-radius:8px;background:var(--grad);box-shadow:0 4px 12px rgba(46,107,255,.34);
  display:flex;align-items:center;justify-content:center;font-size:.85rem}

main{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:14px 18px 52px}

.eyebrow{display:block;text-align:center;font-size:.72rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  margin-top:12px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
h1{font-size:1.7rem;font-weight:900;letter-spacing:-.03em;text-align:center;margin:8px 0 22px;text-wrap:balance}

/* ── OUTFIT CARD (binary) ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.card img{width:100%;height:auto}

/* ── VOTE BUTTONS ── */
.btns{display:flex;gap:12px;margin-top:16px}
.vote{flex:1;border-radius:var(--r-md);padding:17px;font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:-.01em;
  transition:transform .14s var(--ease),box-shadow .2s,opacity .2s;box-shadow:0 8px 22px rgba(16,20,27,.12)}
.vote:hover{transform:translateY(-2px)}
.vote:active{transform:scale(.98)}
.vote.yes{background:linear-gradient(135deg,#16B981,#0FA3A3);box-shadow:0 8px 22px rgba(22,185,129,.32)}
.vote.no{background:linear-gradient(135deg,#F04438,#E11D48);box-shadow:0 8px 22px rgba(240,68,56,.3)}
.vote.pick{width:100%;background:var(--grad);margin-top:12px;padding:13px;font-size:.95rem;box-shadow:0 8px 22px rgba(46,107,255,.3)}
.vote:disabled{opacity:.5;transform:none;box-shadow:none;cursor:default}

/* ── MULTI-OPTION GRID ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.opt{position:relative;background:var(--card);border:2px solid var(--line);border-radius:var(--r-md);overflow:hidden;padding:8px;
  box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s,transform .2s}
.opt img{width:100%;height:auto;border-radius:11px}
.opt.win{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,185,129,.16),0 14px 30px rgba(22,185,129,.14)}
.badge{position:absolute;top:12px;left:12px;width:28px;height:28px;border-radius:50%;
  background:rgba(16,20,27,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;z-index:1}
.opt.win .badge{background:var(--green)}
.optres{text-align:center;font-weight:800;font-size:.95rem;padding:9px 0 4px;color:var(--ink)}

/* ── RESULTS BARS ── */
.res{margin-top:20px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 18px 8px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:12px;margin:0 0 14px}
.lbl{width:74px;font-weight:700;font-size:.92rem}
.track{flex:1;height:16px;background:#EEF2F8;border-radius:var(--pill);overflow:hidden}
.fill{display:block;height:100%;border-radius:var(--pill);width:0;transition:width .8s var(--ease)}
.fill.up{background:linear-gradient(90deg,#16B981,#0FA3A3)}
.fill.down{background:linear-gradient(90deg,#F04438,#E11D48)}
.num{width:44px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums}
.tot{text-align:center;color:var(--muted);margin-top:14px;font-size:.86rem;font-weight:600}

/* thanks note after voting */
.voted-note{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px;
  font-size:.82rem;font-weight:600;color:var(--green)}

.state{text-align:center;color:var(--muted);padding:56px 16px;font-size:1rem}
.state .spin{width:26px;height:26px;margin:0 auto 14px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--blue);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── COMMENTS ── */
.sec-title{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:800;letter-spacing:-.01em;margin:32px 0 14px;color:var(--ink)}
.comments{display:flex;flex-direction:column;gap:11px}
.comment{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 15px;box-shadow:0 1px 2px rgba(16,20,27,.03)}
.comment .who{display:flex;align-items:center;gap:8px;font-weight:800;font-size:.82rem;color:var(--ink);margin-bottom:4px}
.comment .who::before{content:'';width:22px;height:22px;border-radius:50%;background:var(--grad);opacity:.9;flex-shrink:0}
.comment .body{font-size:.95rem;color:#334155;white-space:pre-wrap;word-break:break-word;line-height:1.55}
.comments-empty{color:var(--muted);font-size:.9rem;padding:6px 2px 10px}
.cform{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.cform input,.cform textarea{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;font-size:.95rem;
  font-family:inherit;background:var(--card);color:var(--ink);transition:border-color .2s,box-shadow .2s}
.cform input:focus,.cform textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,107,255,.12)}
.cform textarea{resize:vertical;min-height:52px;line-height:1.5}
.cform .post{align-self:flex-end;background:var(--ink);color:#fff;border-radius:var(--pill);padding:12px 24px;font-weight:700;font-size:.92rem;
  transition:transform .14s,box-shadow .2s,opacity .2s;box-shadow:0 6px 18px rgba(16,20,27,.18)}
.cform .post:hover{transform:translateY(-1px)}
.cform .post:active{transform:scale(.98)}
.cform .post:disabled{opacity:.5;transform:none;box-shadow:none;cursor:default}

/* ── REFERRAL CTA ── */
.cta{position:relative;overflow:hidden;margin-top:32px;border-radius:var(--r-xl);padding:28px 24px;text-align:center;color:#fff;
  background:var(--grad);box-shadow:0 18px 44px rgba(46,107,255,.3),inset 0 1px 0 rgba(255,255,255,.2)}
.cta::before{content:'';position:absolute;inset:0;background:radial-gradient(340px 160px at 50% -20%,rgba(255,255,255,.26),transparent 70%);pointer-events:none}
.cta .k{position:relative;font-size:.72rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.92}
.cta .h{position:relative;font-size:1.4rem;font-weight:900;letter-spacing:-.02em;margin:8px 0 6px;text-wrap:balance}
.cta .p{position:relative;font-size:.92rem;opacity:.94;margin:0 auto 18px;max-width:340px;line-height:1.55}
.cta a{position:relative;display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--ink);font-weight:800;font-size:.98rem;
  padding:14px 28px;border-radius:var(--pill);box-shadow:0 8px 24px rgba(0,0,0,.16);transition:transform .15s,box-shadow .2s}
.cta a:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(0,0,0,.22)}

footer{text-align:center;color:var(--muted);margin-top:30px;font-size:.86rem}
footer a{color:#2456D6;font-weight:700}

@media(max-width:400px){
  h1{font-size:1.5rem}
  .cta .h{font-size:1.25rem}
}
@media(prefers-reduced-motion:reduce){
  .fill{transition:none}
  .state .spin{animation:none}
}
</style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true"></div>

<header><a class="brand" href="https://whichoutfit.app"><span class="logo" aria-hidden="true">👕</span>WhichOutfit</a></header>
<main>
  <span class="eyebrow">Help me pick</span>
  <h1 id="title">Which fit? 👀</h1>
  <div id="poll"><div class="state"><div class="spin" aria-hidden="true"></div>Loading the look…</div></div>

  <div id="extra" style="display:none">
    <!-- friend comments -->
    <div class="sec-title">💬 Comments</div>
    <div id="comments" class="comments"></div>
    <form id="cform" class="cform" autocomplete="off">
      <input id="cname" type="text" maxlength="40" placeholder="Your name (optional)"/>
      <textarea id="cbody" maxlength="280" placeholder="Add a comment — e.g. love the top, swap the shoes"></textarea>
      <button id="cpost" class="post" type="submit">Post comment</button>
    </form>

    <!-- referral vector -->
    <div class="cta">
      <div class="k">Psst — you've got taste</div>
      <div class="h" id="ctaHead">Try WhichOutfit free</div>
      <div class="p" id="ctaSub">Your AI stylist for the wardrobe you already own.</div>
      <a id="redeem" href="#" target="_blank" rel="noopener">Get the app →</a>
    </div>
  </div>

  <footer>Make your own — <a href="https://whichoutfit.app">get WhichOutfit</a></footer>
</main>

<script>
(function () {
  var API = 'https://irfzsyzhoxxtzuugdtef.supabase.co/functions/v1/poll';

  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  var ref = params.get('ref');

  // Install CTA target. When the poll link carries the owner's referral code
  // (?ref=CODE), send voters through the owner's redeem link — whichoutfit.app/r/CODE
  // grants Premium to BOTH sides (our own comp system, no Apple Offer Code needed),
  // so the install is attributed and rewarded. Otherwise fall back to the listing.
  var REDEEM_URL = ref
    ? 'https://whichoutfit.app/r/' + encodeURIComponent(ref)
    : 'https://apps.apple.com/us/app/whichoutfit/id6778094125';
  var root = document.getElementById('poll');
  var extra = document.getElementById('extra');
  var titleEl = document.getElementById('title');
  var commentsEl = document.getElementById('comments');
  var data = null;

  document.getElementById('redeem').href = REDEEM_URL;

  // A poll link carries the owner's referral code, so the reward is the real
  // two-sided comp grant (see r.html) — 2 weeks of Premium + 15 free photo
  // cleanups, NOT "a month". Only promise it when there's actually a code to
  // redeem; without a ref the CTA just points at the App Store listing.
  if (ref) {
    document.getElementById('ctaHead').textContent = 'Get 2 weeks of Premium — free';
    document.getElementById('ctaSub').textContent = "Your AI stylist for the wardrobe you already own. Redeem your friend's code for 2 weeks of Premium + 15 free photo cleanups.";
    document.getElementById('redeem').textContent = 'Claim 2 weeks free →';
  }

  if (!id) { root.innerHTML = '<div class="state">This poll link looks incomplete.</div>'; return; }

  var voter = localStorage.getItem('wo_voter');
  if (!voter) { voter = Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('wo_voter', voter); }

  function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function pct(n, t) { return t > 0 ? Math.round(n * 100 / t) : 0; }
  function bar(label, n, t, cls) {
    var p = pct(n, t);
    return '<div class="row"><span class="lbl">' + label + '</span><span class="track"><span class="fill ' + cls + '" style="width:' + p + '%"></span></span><span class="num">' + p + '%</span></div>';
  }

  function renderComments() {
    var list = (data && data.comments) || [];
    if (!list.length) {
      commentsEl.innerHTML = '<div class="comments-empty">No comments yet — be the first to weigh in.</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < list.length; i++) {
      var c = list[i];
      var who = c.name && c.name.trim() ? esc(c.name) : 'Friend';
      html += '<div class="comment"><div class="who">' + who + '</div><div class="body">' + esc(c.body) + '</div></div>';
    }
    commentsEl.innerHTML = html;
  }

  function render(showResults) {
    if (data.question && data.question.trim()) { titleEl.textContent = data.question; }
    var html = '';
    if (data.kind === 'binary') {
      var o = data.options[0]; var t = o.up + o.down;
      html += '<div class="card"><img src="' + o.image_url + '" alt="outfit"/></div>';
      if (showResults) {
        html += '<div class="res">' + bar('👍 Yes', o.up, t, 'up') + bar('👎 No', o.down, t, 'down') + '</div><p class="tot">' + t + ' vote' + (t === 1 ? '' : 's') + '</p>';
      } else {
        html += '<div class="btns"><button class="vote yes" data-opt="' + o.id + '" data-val="up">👍 Yes</button><button class="vote no" data-opt="' + o.id + '" data-val="down">👎 No</button></div>';
      }
    } else {
      var total = 0; for (var i = 0; i < data.options.length; i++) { total += data.options[i].picks; }
      var top = -1; for (var m = 0; m < data.options.length; m++) { if (data.options[m].picks > top) top = data.options[m].picks; }
      html += '<div class="grid">';
      for (var j = 0; j < data.options.length; j++) {
        var op = data.options[j];
        var win = showResults && total > 0 && op.picks === top ? ' win' : '';
        html += '<div class="opt' + win + '"><div class="badge">' + (j + 1) + '</div><img src="' + op.image_url + '" alt="option"/>';
        if (showResults) { html += '<div class="optres">' + pct(op.picks, total) + '% · ' + op.picks + '</div>'; }
        else { html += '<button class="vote pick" data-opt="' + op.id + '" data-val="pick">Pick this</button>'; }
        html += '</div>';
      }
      html += '</div>';
      if (showResults) { html += '<p class="tot">' + total + ' vote' + (total === 1 ? '' : 's') + '</p>'; }
    }
    root.innerHTML = html;
    if (!showResults) {
      var bs = root.querySelectorAll('.vote');
      for (var k = 0; k < bs.length; k++) { bs[k].addEventListener('click', onVote); }
    }
    extra.style.display = '';
    renderComments();
  }

  function onVote(e) {
    var b = e.currentTarget, opt = b.getAttribute('data-opt'), val = b.getAttribute('data-val');
    var all = root.querySelectorAll('.vote');
    for (var i = 0; i < all.length; i++) { all[i].disabled = true; }
    fetch(API + '?id=' + encodeURIComponent(id), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ option_id: opt, value: val, voter: voter })
    })
      .then(function (r) { return r.json(); })
      .then(function (res) { data = res; localStorage.setItem('wo_voted_' + data.id, '1'); render(true); })
      .catch(function () { for (var i = 0; i < all.length; i++) { all[i].disabled = false; } });
  }

  document.getElementById('cform').addEventListener('submit', function (e) {
    e.preventDefault();
    var bodyEl = document.getElementById('cbody');
    var nameEl = document.getElementById('cname');
    var postBtn = document.getElementById('cpost');
    var text = bodyEl.value.trim();
    if (!text) return;
    postBtn.disabled = true;
    fetch(API + '?id=' + encodeURIComponent(id), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment: text, name: nameEl.value.trim(), voter: voter })
    })
      .then(function (r) { if (!r.ok) throw new Error('post failed'); return r.json(); })
      .then(function (res) { data = res; bodyEl.value = ''; renderComments(); postBtn.disabled = false; })
      .catch(function () { postBtn.disabled = false; });
  });

  fetch(API + '?id=' + encodeURIComponent(id) + '&format=json')
    .then(function (r) { if (!r.ok) throw new Error('not found'); return r.json(); })
    .then(function (res) {
      data = res;
      var voted = localStorage.getItem('wo_voted_' + data.id);
      render(!!voted || data.closed);
    })
    .catch(function () {
      root.innerHTML = '<div class="state">This poll isn’t available anymore.</div>';
    });
})();
</script>
</body>
</html>
